version: 2
models:
  - name: fct_orders
    description: "One row per order, enriched with customer, items, payments and delivery metrics."
    columns:
      - name: order_sk
        description: "Surrogate key (hash of order_id)."
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null, unique]
      - name: order_total
        tests: [not_null]
      - name: order_purchase_ts
        description: "When the order was placed."
        tests: [not_in_future]          # custom generic test (reused below)
      - name: delivered_at
        description: "When the order was delivered (nullable)."
        tests: [not_in_future]          # same generic test, different column = reuse
  - name: dim_customers
    description: "One row per real customer (customer_unique_id) with order history."
    columns:
      - name: customer_sk
        tests: [not_null, unique]
      - name: customer_unique_id
        tests: [not_null, unique]
  - name: dim_products
    description: "Products with an English category label."
    columns:
      - name: product_sk
        description: "Surrogate key (hash of product_id)."
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null, unique]
  - name: gld_revenue_by_category
    description: "Monthly revenue by English product category (delivered orders)."
    columns:
      - name: revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
  - name: gld_delivery_performance
    description: "Delivery KPIs by customer state + region (delivered orders only); joins the br_state_regions seed."
    columns:
      - name: customer_state
        description: "Brazilian state (2-letter), the grain alongside region."
        tests: [not_null]
      - name: region
        description: "Macro-region from the br_state_regions seed."
      - name: delivered_orders
        description: "Count of delivered orders in the state."
        tests: [not_null]
      - name: on_time_pct
        description: "Percent of delivered orders that met the estimated date (0-100)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

  # ---- business cases ----
  - name: gld_seller_scorecard
    description: "Case 1 - one row per seller: seller_state, orders, revenue, avg delivery days, on-time %, avg review score."
    columns:
      - name: seller_id
        description: "Seller grain."
        tests: [not_null, unique]
      - name: seller_state
        description: "Seller's Brazilian state."
      - name: late_pct
        description: "Percent of delivered orders that arrived late (0-100)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100

  - name: gld_customer_cohorts
    description: "Case 2 - customers grouped by first-order month; repeat rate and avg lifetime value."
    columns:
      - name: cohort_month
        description: "Month of the customer's first order (cohort grain)."
        tests: [not_null, unique]
      - name: n_customers
        description: "Number of customers in the cohort."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: n_repeat_customers
        description: "Number of customers in the cohort who have made more than one purchase."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: repeat_customer_pct
        description: "Percent of the cohort that ordered more than once (0-100)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
      - name: avg_lifetime_value
        description: "Average lifetime value of the cohort (sum of all orders per customer)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: gld_review_sentiment_by_category
    description: "Case 3 - per English product category: n_reviews, avg score, % 1-star, % 5-star."
    columns:
      - name: category
        description: "English product category (one row per category)."
        tests: [not_null, unique]
      - name: n_reviews
        description: "Number of reviews for the category."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: avg_review_score
        description: "Average review score for the category (1-5)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5
      - name: pct_1_star
        description: "Percent of reviews that are 1-star (0-100)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
      - name: pct_5_star
        description: "Percent of reviews that are 5-star (0-100)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
