version: 2
models:
  - name: fct_orders
    description: "One row per order, enriched with customer, items, payments and delivery metrics."
    columns:
      - name: order_sk
        description: "Surrogate key (hash of order_id)."
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null, unique]
      - name: order_total
        tests: [not_null]
      - name: order_purchase_ts
        description: "When the order was placed."
        tests: [not_in_future]          # custom generic test (reused below)
      - name: delivered_at
        description: "When the order was delivered (nullable)."
        tests: [not_in_future]          # same generic test, different column = reuse
  - name: dim_customers
    description: "One row per real customer (customer_unique_id) with order history."
    columns:
      - name: customer_sk
        tests: [not_null, unique]
      - name: customer_unique_id
        tests: [not_null, unique]
  - name: dim_products
    description: "Products with an English category label."
    columns:
      - name: product_sk
        description: "Surrogate key (hash of product_id)."
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null, unique]
  - name: gld_revenue_by_category
    description: "Monthly revenue by English product category (delivered orders)."
    columns:
      - name: revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
  - name: gld_delivery_performance
    description: "Delivery KPIs by customer state + region (delivered orders only); joins the br_state_regions seed."
    columns:
      - name: customer_state
        description: "Brazilian state (2-letter), the grain alongside region."
        tests: [not_null]
      - name: region
        description: "Macro-region from the br_state_regions seed."
      - name: delivered_orders
        description: "Count of delivered orders in the state."
        tests: [not_null]
      - name: on_time_pct
        description: "Percent of delivered orders that met the estimated date (0-100)."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
