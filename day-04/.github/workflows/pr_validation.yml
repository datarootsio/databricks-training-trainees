name: PR Validation
# ⚠️ ILLUSTRATIVE COPY — GitHub does NOT run workflows from a nested .github/ folder.
# The LIVE workflow runs from the repo root: .github/workflows/day04-pr-validation.yml
# (same content, but working-directory: day-04/dbt_olist_bundle and triggers scoped to that path).
# This copy is kept next to the bundle for teaching/reference only.
#
# On every PR to main: validate the dbt bundle against dev and run SQL code-quality checks.
# dbt-only — no Python/wheel checks, no Lakeflow.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write        # required for GitHub OIDC (workload identity federation)
  contents: read

jobs:
  # 1) Bundle validation — needs workspace auth (OIDC), no secret stored.
  validate:
    runs-on: ubuntu-latest
    environment: dev       # federation policy subject: repo:<org>/<repo>:environment:dev
    defaults:
      run:
        working-directory: dbt_olist_bundle   # path to the bundle from the repo root (adjust if nested)
    env:
      DATABRICKS_AUTH_TYPE: github-oidc                              # OIDC federates to the SP (no token stored)
      # Environment-scoped SECRETS — resolved from the job's 'dev' environment; same names everywhere.
      # (Neither is truly sensitive — 'vars.' would also work and stays visible in logs.)
      DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Validate dbt bundle (dev)
        run: databricks bundle validate -t dev

  # 2) SQL code quality — SQLFluff lint (gate) + sqlfmt format check.
  # SQLFluff's dbt templater COMPILES models (incremental models check relation existence), so it
  # needs a REAL warehouse connection — not dummy creds. We reuse the dev OIDC session and mint a token.
  sql-lint:
    runs-on: ubuntu-latest
    environment: dev       # gives the OIDC dev secrets — the dbt templater needs a REAL connection
    defaults:
      run:
        working-directory: dbt_olist_bundle
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - uses: astral-sh/setup-uv@v5
      - name: Install tooling (sqlfluff, sqlfmt, dbt) from pyproject
        run: uv sync
      - name: Vendor dbt packages (dbt_utils / dbt_expectations)
        run: uv run dbt deps
      - name: Resolve dbt connection from the OIDC session
        run: |
          {
            echo "DBT_HOST=$(echo "$DATABRICKS_HOST" | sed -E 's#^https?://##; s#/$##')"
            echo "DBT_ACCESS_TOKEN=$(databricks auth token | jq -r .access_token)"
            echo "DBT_HTTP_PATH=/sql/1.0/warehouses/3e5b6674e311a1ff"   # dev SQL warehouse
            echo "DBT_CATALOG=dev_olist"
          } >> "$GITHUB_ENV"
      - name: SQLFluff lint
        run: uv run sqlfluff lint src/models src/tests src/snapshots   # matches local; src/tests/generic is in .sqlfluffignore
      - name: sqlfmt format check
        run: uv run sqlfmt --check .
