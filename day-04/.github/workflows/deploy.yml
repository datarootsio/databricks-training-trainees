name: Deploy
# ⚠️ ILLUSTRATIVE COPY — GitHub does NOT run workflows from a nested .github/ folder.
# The LIVE workflow runs from the repo root: .github/workflows/day04-deploy.yml
# (same content, but working-directory: day-04/dbt_olist_bundle and triggers scoped to that path).
# This copy is kept next to the bundle for teaching/reference only.
#
# Deploy the dbt bundle via OAuth M2M (service-principal client id + secret).
#   push to main → deploy + run on DEV (automatic)
#   prod         → same workflow, gated by the 'prod' GitHub Environment (add required reviewers)
# Promotion is gated by environment approval — no release tags, no versioning.
on:
  push:
    branches:
      - main
      - feature/han-solutions
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    concurrency: dev       # never deploy dev twice at once
    defaults:
      run:
        working-directory: dbt_olist_bundle   # path to the bundle from the repo root (adjust if nested)
    env:
      DATABRICKS_AUTH_TYPE: oauth-m2m
      # Environment-scoped SECRETS — same names in every environment; GitHub resolves them from the
      # job's `environment:` (here 'dev'). No _DEV/_PROD suffix needed.
      DATABRICKS_HOST:          ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}   # SP OAuth secret
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy dbt bundle (dev)
        run: databricks bundle deploy -t dev          # mode: production → runs as the M2M SP
      - name: Run dbt job (dev)
        run: databricks bundle run dbt_olist_bundle_job -t dev

  deploy-prod:
    needs: deploy-dev      # promote only after dev succeeds
    runs-on: ubuntu-latest
    # MANUAL REVIEW GATE: this job PAUSES for approval before running, IF the `prod` GitHub
    # Environment has "Required reviewers" set (repo → Settings → Environments → prod). That
    # approval IS the manual review before prod. ⚠️ Without required reviewers, prod auto-deploys.
    environment: prod
    concurrency: prod
    defaults:
      run:
        working-directory: dbt_olist_bundle
    env:
      DATABRICKS_AUTH_TYPE: oauth-m2m
      # Same secret NAMES as dev — GitHub resolves them from the 'prod' environment.
      DATABRICKS_HOST:          ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy dbt bundle (prod)
        run: databricks bundle deploy -t prod
      - name: Run dbt job (prod)
        run: databricks bundle run dbt_olist_bundle_job -t prod
