# This file defines the structure of this project and how it is deployed
# to production using Declarative Automation Bundles.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dbt_olist_bundle
  uuid: 054c7130-be7e-40d7-bde8-567a76b256c8

include:
  - resources/*.yml

# Deployment targets.
# The default schema, catalog, etc. for dbt are defined in dbt_profiles/profiles.yml
targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405611603719107.7.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-7405611603719107.7.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/sukru.hansahin@talan.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sukru.hansahin@talan.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: sukru.hansahin@talan.com
        level: CAN_MANAGE
