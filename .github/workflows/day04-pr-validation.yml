name: Day04 PR Validation
# On a PR to main that touches the day-04 bundle: validate it against dev + SQL code-quality checks.
# dbt-only — no Python/wheel checks, no Lakeflow. Auth = OAuth M2M (service-principal client id + secret).
# NOTE: GitHub only runs workflows from THIS path (repo-root .github/workflows/). The copy under
# day-04/.github/workflows/ is illustrative and does NOT run.
on:
  pull_request:
    branches: [main]
    paths: ["day-04/dbt_olist_bundle/**"]   # only when the day-04 bundle changes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: day-04/dbt_olist_bundle   # bundle path from the repo root
    env:
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_HOST:          ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}   # SP OAuth secret
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Validate dbt bundle (dev)
        run: databricks bundle validate -t dev

  sql-lint:
    runs-on: ubuntu-latest
    environment: dev       # gives the dev secrets — the dbt templater needs a REAL connection
    defaults:
      run:
        working-directory: day-04/dbt_olist_bundle
    env:
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_HOST:          ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - uses: astral-sh/setup-uv@v5
      - name: Install tooling (sqlfluff, sqlfmt, dbt) from pyproject
        run: uv sync
      - name: Vendor dbt packages (dbt_utils / dbt_expectations)
        run: uv run dbt deps
      - name: Resolve dbt connection (mint an M2M OAuth token)
        # SQLFluff's dbt templater compiles models, and the incremental model checks relation
        # existence — which needs a REAL warehouse connection. `databricks auth token` is for U2M
        # logins, so for M2M we mint a token directly from the SP's client credentials.
        run: |
          HOST="$(echo "$DATABRICKS_HOST" | sed -E 's#/$##')"            # full https URL, no trailing slash
          TOKEN="$(curl -sf -u "$DATABRICKS_CLIENT_ID:$DATABRICKS_CLIENT_SECRET" \
            --data 'grant_type=client_credentials' --data 'scope=all-apis' \
            "$HOST/oidc/v1/token" | jq -r .access_token)"
          echo "::add-mask::$TOKEN"
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Failed to mint an M2M token — check the SP client id/secret and its workspace access."; exit 1
          fi
          {
            echo "DBT_HOST=$(echo "$HOST" | sed -E 's#^https?://##')"
            echo "DBT_ACCESS_TOKEN=$TOKEN"
            echo "DBT_HTTP_PATH=/sql/1.0/warehouses/3e5b6674e311a1ff"    # dev SQL warehouse
            echo "DBT_CATALOG=dev_olist"
          } >> "$GITHUB_ENV"
      - name: sqlfmt format check (BEFORE lint — sqlfmt owns layout)
        run: uv run sqlfmt --check .
      - name: SQLFluff lint
        run: uv run sqlfluff lint src/models src/tests src/snapshots   # semantics only; sqlfmt owns layout
